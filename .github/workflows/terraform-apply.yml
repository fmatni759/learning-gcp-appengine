name: "Deploy - App Engine + Terraform Apply"

on:
  push:
    branches: [ main ]

jobs:
  terraform-apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Auth GCP"
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - name: "Terraform Init"
        working-directory: terraform
        run: terraform init
      - name: "Terraform Apply"
        working-directory: terraform
        run: terraform apply -var="project_id=${{ secrets.GCP_PROJECT_ID }}" -var="environment=prod" -auto-approve -no-color

  deploy-appengine:
    name: "Deploy App Engine"
    runs-on: ubuntu-latest
    needs: terraform-apply
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Auth GCP"
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: "Deploy App Engine"
        uses: google-github-actions/deploy-appengine@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          promote: true
      - name: "URL"
        run: echo "URL https://${{ secrets.GCP_PROJECT_ID }}.appspot.com"